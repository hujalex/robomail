name: Publish SDK

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Fern
        run: npm install -g fern-api

      - name: Publish SDK
        run: fern generate --group publish
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_VERSION: ${{ github.ref_name }}
